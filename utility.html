<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/logo.png">

<title>UTILITY PANEL</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#0033cc;
    font-family:'Share Tech Mono', monospace;
    color:#ffffff;
}

.app{

    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;
}

.box{

    width:420px;

    border:2px solid #ffffff;

    background:#0033cc;

    padding:30px;

    box-shadow:12px 12px 0px #000;
}

.title{

    text-align:center;

    font-size:32px;

    margin-bottom:30px;

    color:#ff66cc;

    letter-spacing:3px;
}

.group{

    margin-bottom:20px;
}

.group label{

    display:block;

    margin-bottom:10px;

    font-size:18px;
}

.group input{

    width:100%;

    height:55px;

    border:none;

    outline:none;

    background:#9fc3ff;

    color:#0033cc;

    padding:0 15px;

    font-size:22px;

    font-family:'Share Tech Mono', monospace;
}

.show-pass{

    display:flex;

    align-items:center;

    gap:10px;

    margin-bottom:25px;

    color:#99ffcc;
}

.show-pass input{

    width:20px;
    height:20px;
}

.btn{

    width:100%;

    height:55px;

    border:2px solid #ffffff;

    background:#0033cc;

    color:#ffffff;

    font-size:22px;

    cursor:pointer;

    font-family:'Share Tech Mono', monospace;

    transition:0.1s;
}

.btn:hover{

    background:#9fc3ff;

    color:#0033cc;

    box-shadow:6px 6px 0px #000;
}

.message{

    margin-top:20px;

    text-align:center;

    font-size:18px;

    min-height:25px;
}

.success{

    color:#00ff66;
}

.error{

    color:#ff5555;
}

.help{

    margin-top:25px;

    text-align:center;

    font-size:15px;

    color:#99ffcc;

    line-height:1.8;
}

</style>
</head>
<body>

<div class="app">

    <div class="box">

        <div class="title">
            CHANGE PASSWORD
        </div>

        <!-- OLD -->

        <div class="group">

            <label>
                OLD PASSWORD
            </label>

            <input type="password"
                   id="oldPassword"
                   maxlength="6"
                   placeholder="6 DIGIT PASSWORD">

        </div>

        <!-- NEW -->

        <div class="group">

            <label>
                NEW PASSWORD
            </label>

            <input type="password"
                   id="newPassword"
                   maxlength="6"
                   placeholder="NEW 6 DIGIT PASSWORD">

        </div>

        <!-- CONFIRM -->

        <div class="group">

            <label>
                CONFIRM PASSWORD
            </label>

            <input type="password"
                   id="confirmPassword"
                   maxlength="6"
                   placeholder="CONFIRM PASSWORD">

        </div>

        <!-- SHOW -->

        <div class="show-pass">

            <input type="checkbox"
                   id="showPass">

            <label for="showPass">
                SHOW PASSWORD
            </label>

        </div>

        <!-- BUTTON -->

        <button class="btn"
                id="changeBtn">

            CHANGE PASSWORD

        </button>

        <!-- MESSAGE -->

        <div class="message"
             id="messageBox">

        </div>

        <!-- HELP -->

        <div class="help">

            PASSWORD MUST BE 6 DIGITS ONLY<br>

            ESC = DASHBOARD

        </div>

    </div>

</div>

<script>

/* =========================================
SECURITY
========================================= */

if(
    localStorage.getItem('admin_login')
    !== 'true'
){

    window.location.href =
        'login.html';

}

/* =========================================
DEFAULT PASSWORD
========================================= */

/*
IMPORTANT:

Your login.html uses:
123456

So utility.html must also use:
123456
*/

if(
    !localStorage.getItem('admin_password')
){

    localStorage.setItem(
        'admin_password',
        '123456'
    );

}

/* =========================================
ELEMENTS
========================================= */

const oldPassword =
    document.getElementById(
        'oldPassword'
    );

const newPassword =
    document.getElementById(
        'newPassword'
    );

const confirmPassword =
    document.getElementById(
        'confirmPassword'
    );

const messageBox =
    document.getElementById(
        'messageBox'
    );

const showPass =
    document.getElementById(
        'showPass'
    );

/* =========================================
NUMERIC ONLY
========================================= */

function numericOnly(input){

    input.addEventListener(
        'input',
        function(){

            this.value =
                this.value.replace(
                    /[^0-9]/g,
                    ''
                );

        }
    );

}

numericOnly(oldPassword);
numericOnly(newPassword);
numericOnly(confirmPassword);

/* =========================================
SHOW PASSWORD
========================================= */

showPass.addEventListener(
    'change',
    function(){

        const type =
            this.checked
            ? 'text'
            : 'password';

        oldPassword.type = type;
        newPassword.type = type;
        confirmPassword.type = type;

    }
);

/* =========================================
MESSAGE
========================================= */

function showMessage(text,type){

    messageBox.innerHTML = text;

    messageBox.className =
        'message ' + type;

}

/* =========================================
CHANGE PASSWORD
========================================= */

function changePassword(){

    const oldPass =
        oldPassword.value.trim();

    const newPass =
        newPassword.value.trim();

    const confirmPass =
        confirmPassword.value.trim();

    const savedPassword =
        localStorage.getItem(
            'admin_password'
        );

    /* EMPTY */

    if(
        !oldPass ||
        !newPass ||
        !confirmPass
    ){

        showMessage(
            'FILL ALL FIELDS',
            'error'
        );

        return;

    }

    /* 6 DIGIT */

    if(
        oldPass.length !== 6 ||
        newPass.length !== 6 ||
        confirmPass.length !== 6
    ){

        showMessage(
            'PASSWORD MUST BE 6 DIGITS',
            'error'
        );

        return;

    }

    /* OLD PASSWORD */

    if(oldPass !== savedPassword){

        showMessage(
            'OLD PASSWORD INCORRECT',
            'error'
        );

        return;

    }

    /* SAME PASSWORD */

    if(oldPass === newPass){

        showMessage(
            'OLD & NEW PASSWORD SAME',
            'error'
        );

        return;

    }

    /* CONFIRM */

    if(newPass !== confirmPass){

        showMessage(
            'CONFIRM PASSWORD NOT MATCH',
            'error'
        );

        return;

    }

    /* SAVE NEW PASSWORD */

    localStorage.setItem(
        'admin_password',
        newPass
    );

    showMessage(
        'PASSWORD CHANGED SUCCESSFULLY',
        'success'
    );

    /* CLEAR */

    oldPassword.value = '';
    newPassword.value = '';
    confirmPassword.value = '';

    oldPassword.focus();

}

/* =========================================
BUTTON
========================================= */

document.getElementById(
    'changeBtn'
).addEventListener(
    'click',
    changePassword
);

/* =========================================
ENTER + ESC
========================================= */

document.addEventListener(
    'keydown',
    function(e){

        /* ENTER */

        if(e.key === 'Enter'){

            changePassword();

        }

        /* ESC */

        if(e.key === 'Escape'){

            window.location.href =
                'dashboard.html';

        }

    }
);

/* =========================================
DISABLE RIGHT CLICK
========================================= */

document.addEventListener(
    'contextmenu',
    e=>e.preventDefault()
);

/* =========================================
DISABLE SELECT
========================================= */

document.addEventListener(
    'selectstart',
    e=>e.preventDefault()
);

/* =========================================
FOCUS
========================================= */

oldPassword.focus();

</script>

</body>
</html>
